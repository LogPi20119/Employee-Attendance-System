<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Employee Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary px-4 mb-4">
    <span class="navbar-brand fw-bold">EMS</span>
    <div class="d-flex gap-4">
      <a class="text-white text-decoration-none" href="/">Dashboard</a>
      <a class="text-white text-decoration-none" href="/employees">Employee</a>
      <a class="text-white text-decoration-none" href="/attendance">Attendance</a>
      <a class="text-white text-decoration-none" href="/leave">Leave</a>
      <a class="text-white text-decoration-none ms-4"
        href="/logout"
        onclick="return confirm('Sign out?')"
        style="opacity:0.7">Sign out</a>
    </div>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show">
          {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
