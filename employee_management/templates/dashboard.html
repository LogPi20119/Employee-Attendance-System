{% extends 'base.html' %}
{% block content %}
<h4 class="mb-4">Dashboard</h4>
<div class="row g-3">

  <div class="col-md-4">
    <a href="/employees" class="text-decoration-none">
      <div class="card text-center p-4 border-primary h-100 dashboard-card">
        <div class="display-5 fw-bold text-primary">{{ total_emp }}</div>
        <div class="text-muted mt-1">Active Employees</div>
      </div>
    </a>
  </div>

  <div class="col-md-4">
    <a href="/attendance" class="text-decoration-none">
      <div class="card text-center p-4 border-success h-100 dashboard-card">
        <div class="display-5 fw-bold text-success">{{ present_today }}</div>
        <div class="text-muted mt-1">Present Today</div>
        <div class="mt-2 d-flex justify-content-center gap-3">
          <span class="badge bg-success">✅ On time: {{ on_time_today }}</span>
          <span class="badge bg-warning text-dark">⏰ Late: {{ late_today }}</span>
        </div>
      </div>
    </a>
  </div>

  <div class="col-md-4">
    <a href="/leave" class="text-decoration-none">
      <div class="card text-center p-4 border-warning h-100 dashboard-card">
        <div class="display-5 fw-bold text-warning">{{ pending_leave }}</div>
        <div class="text-muted mt-1">Pending Leave Requests</div>
      </div>
    </a>
  </div>

</div>

<style>
  .dashboard-card {
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .dashboard-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.1);
  }
</style>
{% endblock %}
