{% extends 'base.html' %}
{% block content %}
<h4 class="mb-4">Dashboard</h4>
<div class="row g-3">
  <div class="col-md-4">
    <div class="card text-center p-4 border-primary">
      <div class="display-5 fw-bold text-primary">{{ total_emp }}</div>
      <div class="text-muted mt-1">Nhân viên đang làm việc</div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center p-4 border-success">
      <div class="display-5 fw-bold text-success">{{ present_today }}</div>
      <div class="text-muted mt-1">Có mặt hôm nay</div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center p-4 border-warning">
      <div class="display-5 fw-bold text-warning">{{ pending_leave }}</div>
      <div class="text-muted mt-1">Đơn phép chờ duyệt</div>
    </div>
  </div>
</div>
{% endblock %}
